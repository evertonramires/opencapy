<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OpenCapy Chat</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; }
    #messages { border: 1px solid #ccc; padding: 12px; height: 400px; overflow-y: auto; }
    .user { text-align: right; margin: 8px 0; }
    .bot { text-align: left; margin: 8px 0; }
    form { display: flex; gap: 8px; margin-top: 12px; }
    input { flex: 1; padding: 10px; }
    button { padding: 10px 16px; }
  </style>
</head>
<body>
  <h1>Chat</h1>
  <div id="messages"></div>

  <form id="chat-form">
    <input id="message-input" placeholder="Type a message..." />
    <button type="submit">Send</button>
  </form>

  <script>
    const messages = document.getElementById("messages");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const apiBase = "";

    function addMessage(text, who) {
      const div = document.createElement("div");
      div.className = who;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage(text) {
      await fetch(`${apiBase}/inbox`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
    }

    async function pollMessages() {
      const res = await fetch(`${apiBase}/outbox`);
      const data = await res.json();
      for (const msg of data.messages) addMessage(msg, "bot");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, "user");
      input.value = "";
      await sendMessage(text);
    });

    setInterval(pollMessages, 3000);
    pollMessages();
  </script>
</body>
</html>
